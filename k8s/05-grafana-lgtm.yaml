# Optional observability stack (Grafana + Loki + Tempo + Mimir all-in-one),
# mirroring the "grafana-lgtm" service in compose.yaml. Remove this file if
# you already have an OTEL collector / Grafana stack in the cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-lgtm
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: grafana-lgtm
    app.kubernetes.io/part-of: ledgerx-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-lgtm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-lgtm
        app.kubernetes.io/part-of: ledgerx-backend
    spec:
      containers:
        - name: grafana-lgtm
          image: grafana/otel-lgtm:latest
          ports:
            - containerPort: 3000
              name: grafana-ui
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-lgtm
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: grafana-lgtm
    app.kubernetes.io/part-of: ledgerx-backend
spec:
  selector:
    app.kubernetes.io/name: grafana-lgtm
  ports:
    - port: 3000
      targetPort: 3000
      name: grafana-ui
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      name: otlp-http
