# NOTE: no Spring Boot Actuator dependency is on the classpath, so the probes
# below target /v3/api-docs (permitted by SecurityConfig without auth) as a
# stand-in health check. Add spring-boot-starter-actuator and switch these to
# /actuator/health/{readiness,liveness} for production-grade health checks.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledgerx-backend
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: ledgerx-backend
    app.kubernetes.io/part-of: ledgerx-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ledgerx-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ledgerx-backend
        app.kubernetes.io/part-of: ledgerx-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z -w2 postgres 5432; do echo waiting for postgres; sleep 2; done"
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z -w2 rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done"
      containers:
        - name: ledgerx-backend
          image: ledgerx-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ledgerx-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ledgerx-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ledgerx-config
                  key: DB_NAME
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: ledgerx-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: ledgerx-config
                  key: RABBITMQ_PORT
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: ledgerx-config
                  key: SERVER_PORT
            - name: LEDGERX_SEED_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: ledgerx-config
                  key: LEDGERX_SEED_ENABLED
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ledgerx-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ledgerx-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: ledgerx-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ledgerx-secrets
                  key: RABBITMQ_PASSWORD
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://grafana-lgtm:4318"
            - name: OTEL_SERVICE_NAME
              value: "ledgerx-backend"
          startupProbe:
            httpGet:
              path: /v3/api-docs
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /v3/api-docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v3/api-docs
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ledgerx-backend
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: ledgerx-backend
    app.kubernetes.io/part-of: ledgerx-backend
spec:
  selector:
    app.kubernetes.io/name: ledgerx-backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
