# Requires the metrics-server add-on in the cluster to read CPU utilization.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ledgerx-backend
  namespace: ledgerx
  labels:
    app.kubernetes.io/name: ledgerx-backend
    app.kubernetes.io/part-of: ledgerx-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ledgerx-backend
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
